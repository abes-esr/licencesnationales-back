name: "build-test-pubtodockerhub"

# IMPORTANT : personnalisez cette variable pour que les images
# de votre application soient pousées sur dockerhub
# dans le repository ayant ce nom
# exemple, si vous indiquez : abesesr/abes-hello
#   alors l'image sera poussée sur https://hub.docker.com/r/abesesr/abes-hello
env:
  DOCKERHUB_IMAGE_PREFIX: abesesr/licencesnationales
  
on:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
  workflow_dispatch:

jobs:
  build-test-pubtodockerhub:
    runs-on: ubuntu-latest
    steps:

      - name: "Build: checkout source code"
        uses: actions/checkout@v6

      - name: "Push: prepare version from git tags/branchs"
        id: docker_tag_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE_PREFIX }}
      - name: "Login to DockerHub"
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Buildx WEB and push"
        uses: docker/build-push-action@v7
        with:
          push: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
          target: web-image
          tags: ${{ steps.docker_tag_meta.outputs.tags }}-web

      - name: "Buildx BATCH and push"
        uses: docker/build-push-action@v7
        with:
          push: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
          target: batch-image
          tags: ${{ steps.docker_tag_meta.outputs.tags }}-batch
